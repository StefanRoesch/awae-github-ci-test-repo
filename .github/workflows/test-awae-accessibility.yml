# Test workflow for awae.github-ci.yml — this repo only.
# Like awae-project-zero: serve job provides AWAE_URLS, then we use the template (reusable workflow) for the a11y check.
# No duplicated polling script; the a11y logic lives only in .github/workflows/awae.github-ci.yml.
name: Test AWAE Accessibility (serve + a11y)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  serve:
    runs-on: ubuntu-latest
    outputs:
      awae_urls: ${{ steps.tunnel.outputs.awae_urls }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl
          curl -sL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64" -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Serve public/ and expose via Cloudflare quick tunnel
        id: tunnel
        run: |
          python3 -m http.server 8080 --directory public &
          sleep 2
          cloudflared tunnel --url http://localhost:8080 2>&1 | tee tunnel.log &
          echo "Waiting for tunnel URL (max 30s)..."
          for i in $(seq 1 30); do
            TEST_SITE_BASE=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1)
            [ -n "$TEST_SITE_BASE" ] && break
            sleep 1
          done
          if [ -z "$TEST_SITE_BASE" ]; then
            echo "Failed to get tunnel URL. tunnel.log:"
            cat tunnel.log
            exit 1
          fi
          BASE="${TEST_SITE_BASE%/}/"
          AWAE_URLS=$(find public -type f -name "*.html" 2>/dev/null | sed 's|^public/||' | while read path; do echo "${BASE}${path}"; done | tr '\n' ',' | sed 's/,$//')
          echo "awae_urls=$AWAE_URLS" >> $GITHUB_OUTPUT
          echo "Tunnel base: $BASE"
          echo "URL count: $(echo "$AWAE_URLS" | tr ',' '\n' | wc -l)"

  a11y-check:
    needs: serve
    environment: dev
    uses: ./.github/workflows/awae.github-ci.yml
    with:
      awae_urls: ${{ needs.serve.outputs.awae_urls }}
    secrets:
      AWAE_HOST: ${{ secrets.AWAE_HOST }}
      AWAE_API_TOKEN: ${{ secrets.AWAE_API_TOKEN }}
      AWAE_USER_ID: ${{ secrets.AWAE_USER_ID }}

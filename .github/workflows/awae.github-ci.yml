# AWAE a11y check — GitHub Actions workflow (generic, URL-in report-out).
# Copy this file to .github/workflows/awae-accessibility.yml in your repo (or use workflow_call from another workflow).
#
# Required: AWAE_HOST and AWAE_USER_ID (environment/repo variables), AWAE_API_TOKEN (secret).
# Required: Set AWAE_URLS — when triggered by push/pull_request use vars.AWAE_URLS;
#   when called via workflow_call pass awae_urls as input (e.g. from a serve job).
#
# Multi-platform: The script below is platform-agnostic (validate, POST, poll, download).
# Only the upload-sarif step is GitHub-specific.
name: AWAE Accessibility Check

on:
  workflow_call:
    inputs:
      awae_urls:
        description: "Comma-separated URLs to scan (when called from another workflow, e.g. test repo serve job)"
        required: false
        type: string
      awae_host:
        description: "AWAE API host URL (when caller passes env var; else use vars.AWAE_HOST)"
        required: false
        type: string
      awae_user_id:
        description: "AWAE user UUID (when caller passes env var; else use vars.AWAE_USER_ID)"
        required: false
        type: string
    secrets:
      AWAE_API_TOKEN:
        required: false
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  a11y-check:
    runs-on: ubuntu-latest
    # When called from test workflow (or run here): use dev environment so this job gets AWAE_* secrets from it.
    # Customers who copy this file: set the same environment name, or remove this line and use repo-level secrets.
    environment: dev
    env:
      # AWAE_HOST and AWAE_USER_ID: from input (when called) or env vars (standalone). AWAE_API_TOKEN: secret only.
      AWAE_HOST: ${{ inputs.awae_host || vars.AWAE_HOST }}
      AWAE_USER_ID: ${{ inputs.awae_user_id || vars.AWAE_USER_ID }}
      AWAE_API_TOKEN: ${{ secrets.AWAE_API_TOKEN }}
      # When called: use input. When run standalone: use repo variable.
      AWAE_URLS: ${{ inputs.awae_urls || vars.AWAE_URLS }}
      AWAE_ACCESSIBILITY_FORMAT: sarif
      AWAE_REPORT_FILE: results.sarif
      AWAE_POLL_INTERVAL: "15"
      AWAE_POLL_MAX_MINUTES: "10"
      CI_PROJECT_NAME: ${{ github.repository }}
      CI_COMMIT_REF_NAME: ${{ github.ref_name }}
      CI_COMMIT_SHORT_SHA: ${{ github.sha }}
    steps:
      - name: Install curl and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq

      - name: Run AWAE a11y check
        run: |
          set -e
          echo "AWAE a11y check started"

          # --- Validate required CI/CD variables ---
          if [ -z "${AWAE_HOST}" ] || [ -z "${AWAE_API_TOKEN}" ] || [ -z "${AWAE_USER_ID}" ]; then
            echo "ERROR: Set AWAE_HOST and AWAE_USER_ID (vars) and AWAE_API_TOKEN (secret) in the environment or repo"
            exit 1
          fi
          if [ -z "${AWAE_URLS}" ]; then
            echo "ERROR: Set variable AWAE_URLS (comma-separated list of reachable URLs to scan)."
            exit 1
          fi

          # --- Polling config and jitter helper (adds 0–3s randomness to backoff) ---
          POLL_INTERVAL="${AWAE_POLL_INTERVAL:-15}"
          POLL_MAX_MINUTES="${AWAE_POLL_MAX_MINUTES:-10}"
          POLL_MAX_SECONDS=$(( POLL_MAX_MINUTES * 60 ))
          jitter_s() { delay=$1; echo $(( delay + $(od -An -N1 -i /dev/urandom 2>/dev/null | tr -d ' ') % 4 )); }

          # --- Parse AWAE_URLS into JSON array and ensure at least one URL ---
          echo "Using provided AWAE_URLS"
          URLS_JSON=$(echo "${AWAE_URLS}" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          COUNT=$(echo "$URLS_JSON" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: AWAE_URLS is set but contains no valid URLs (comma-separated)."
            exit 1
          fi
          echo "Sending $COUNT URL(s) to AWAE"

          # --- Build POST body (title, description, user_id, urls) ---
          TITLE="${AWAE_TITLE:-$CI_PROJECT_NAME}"
          DESC="$CI_COMMIT_REF_NAME @ $CI_COMMIT_SHORT_SHA"
          BODY=$(jq -n --arg title "$TITLE" --arg desc "$DESC" --arg uid "$AWAE_USER_ID" --argjson urls "$URLS_JSON" '{title: $title, description: $desc, user_id: $uid, urls: $urls}')

          # --- Create report: POST with retry and exponential backoff (up to 3 attempts) ---
          REPORT_ID=""
          POST_ATTEMPTS=0
          POST_MAX=3
          T_INITIAL=5
          T_MAX=60
          while [ $POST_ATTEMPTS -lt $POST_MAX ]; do
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$AWAE_HOST/api/reports" -H "Authorization: Bearer $AWAE_API_TOKEN" -H "Content-Type: application/json" -d "$BODY")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY_ONLY=$(echo "$RESPONSE" | sed '$d')
            REPORT_ID=$(echo "$BODY_ONLY" | jq -r '.report_id')
            if [ "$HTTP_CODE" = "202" ] && [ -n "$REPORT_ID" ] && [ "$REPORT_ID" != "null" ]; then
              break
            fi
            POST_ATTEMPTS=$(( POST_ATTEMPTS + 1 ))
            echo "POST attempt $POST_ATTEMPTS failed (HTTP $HTTP_CODE)"
            if [ $POST_ATTEMPTS -ge $POST_MAX ]; then
              echo "Failed to create report after $POST_MAX attempts: $BODY_ONLY"
              exit 1
            fi
            BACKOFF=$(( T_INITIAL * (1 << (POST_ATTEMPTS - 1)) ))
            [ $BACKOFF -gt $T_MAX ] && BACKOFF=$T_MAX
            SLEEP=$(jitter_s $BACKOFF)
            echo "Backoff ${SLEEP}s before retry"
            sleep $SLEEP
          done
          echo "Report created: $REPORT_ID"

          # --- Poll until evaluation is done or failed: fixed interval on success, backoff + circuit breaker on errors ---
          STATUS=""
          POLL_COUNT=0
          POLL_FAILURES=0
          POLL_FAIL_MAX=5
          T_POLL_INITIAL=10
          T_POLL_MAX=120
          START=$(date +%s)
          while true; do
            NOW=$(date +%s)
            if [ $(( NOW - START )) -ge $POLL_MAX_SECONDS ]; then
              echo "Timeout after ${POLL_MAX_MINUTES} minutes waiting for evaluation"
              exit 1
            fi
            POLL_RESP=$(curl -s -w "\n%{http_code}" "$AWAE_HOST/api/reports/$REPORT_ID" -H "Authorization: Bearer $AWAE_API_TOKEN") || true
            POLL_HTTP=$(echo "$POLL_RESP" | tail -n1)
            POLL_BODY=$(echo "$POLL_RESP" | sed '$d')
            STATUS=$(echo "$POLL_BODY" | jq -r '.evaluations[0].status // empty')
            if [ "$POLL_HTTP" = "200" ] && [ -n "$STATUS" ]; then
              POLL_FAILURES=0
              POLL_COUNT=$(( POLL_COUNT + 1 ))
              echo "Poll #$POLL_COUNT status=$STATUS"
              case "$STATUS" in
                done) break ;;
                failed) echo "Evaluation failed"; exit 1 ;;
                *) ;;
              esac
              sleep $POLL_INTERVAL
            else
              POLL_FAILURES=$(( POLL_FAILURES + 1 ))
              echo "Poll failed (HTTP $POLL_HTTP or invalid body), consecutive failures: $POLL_FAILURES"
              if [ $POLL_FAILURES -ge $POLL_FAIL_MAX ]; then
                echo "Circuit breaker: polling failed after $POLL_FAIL_MAX consecutive errors"
                exit 1
              fi
              BACKOFF=$(( T_POLL_INITIAL * (1 << (POLL_FAILURES - 1)) ))
              [ $BACKOFF -gt $T_POLL_MAX ] && BACKOFF=$T_POLL_MAX
              SLEEP=$(jitter_s $BACKOFF)
              echo "Backoff ${SLEEP}s before next poll"
              sleep $SLEEP
            fi
          done

          # --- Download accessibility report ---
          echo "Evaluation status: done"
          EVAL_ID=$(curl -s "$AWAE_HOST/api/reports/$REPORT_ID" -H "Authorization: Bearer $AWAE_API_TOKEN" | jq -r '.evaluations[0].id')

          REPORT_FILE="${AWAE_REPORT_FILE:-results.sarif}"
          ACCESSIBILITY_URL="$AWAE_HOST/api/reports/$REPORT_ID/evaluations/$EVAL_ID/accessibility"
          if [ -n "${AWAE_ACCESSIBILITY_FORMAT}" ]; then
            ACCESSIBILITY_URL="${ACCESSIBILITY_URL}?format=${AWAE_ACCESSIBILITY_FORMAT}"
          fi
          curl -f -o "$REPORT_FILE" "$ACCESSIBILITY_URL" -H "Authorization: Bearer $AWAE_API_TOKEN"
          VIOLATIONS=$(jq '.runs[0].results | length' "$REPORT_FILE" 2>/dev/null || echo "0")
          echo "Downloaded $REPORT_FILE ($VIOLATIONS violation(s))"

          if [ "${AWAE_DOWNLOAD_QUALWEB}" = "true" ]; then
            curl -f -OJ "$AWAE_HOST/api/reports/$REPORT_ID/evaluations/$EVAL_ID/qualweb" -H "Authorization: Bearer $AWAE_API_TOKEN" || true
          fi

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: awae-accessibility
